<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spot the AI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
    <meta name="description" content="Two short passages — one written by a human author, one by Claude. Can you tell which is which?" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Spot the AI" />
    <meta property="og:url" content="https://spot-the-ai.oiatc.ca/" />
    <meta property="og:title" content="Spot the AI" />
    <meta property="og:description" content="Two short passages — one written by a human author, one by Claude. Can you tell which is which?" />
    <meta property="og:image" content="https://spot-the-ai.oiatc.ca/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Spot the AI — human, or machine?" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Spot the AI" />
    <meta name="twitter:description" content="Two short passages — one written by a human author, one by Claude. Can you tell which is which?" />
    <meta name="twitter:image" content="https://spot-the-ai.oiatc.ca/og.png" />
    <script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1115;
        --panel: #171a21;
        --panel-hover: #1f2430;
        --border: #2a2f3a;
        --text: #e7e9ee;
        --muted: #8a93a4;
        --accent: #7c5cff;
        --good: #2ecc71;
        --bad: #ff5c7a;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: ui-serif, Georgia, 'Times New Roman', serif;
        min-height: 100vh;
        padding: 2rem 1rem 4rem;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 1.5rem;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0;
        letter-spacing: -0.02em;
      }
      h1 .accent { color: var(--accent); }
      .score {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        font-size: 0.95rem;
      }
      .score strong { color: var(--text); }
      .header-right {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .share {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent);
        padding: 0.4rem 0.9rem;
        font-size: 0.85rem;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: background 120ms ease, color 120ms ease;
        white-space: nowrap;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }
      .share:hover {
        background: var(--accent);
        color: white;
      }
      .prompt {
        text-align: center;
        color: var(--muted);
        margin: 0 0 1.5rem;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.25rem;
      }
      @media (max-width: 760px) {
        .grid { grid-template-columns: 1fr; }
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.5rem 1.5rem 1.25rem;
        cursor: pointer;
        transition: transform 80ms ease, border-color 120ms ease, background 120ms ease;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        min-height: 280px;
      }
      .card:hover:not(.locked) {
        background: var(--panel-hover);
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .card .label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 0.8rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .card .text {
        font-size: 1.05rem;
        line-height: 1.6;
        white-space: pre-wrap;
      }
      .card.locked { cursor: default; }
      .card.revealed-ai { border-color: var(--accent); }
      .card.revealed-human { border-color: var(--border); }
      .card .verdict {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 0.85rem;
        color: var(--muted);
        margin-top: auto;
      }
      .card .verdict .tag {
        display: inline-block;
        padding: 0.15rem 0.5rem;
        border-radius: 999px;
        font-weight: 600;
        letter-spacing: 0.04em;
        margin-right: 0.5rem;
      }
      .tag.ai { background: rgba(124, 92, 255, 0.18); color: var(--accent); }
      .tag.human { background: rgba(46, 204, 113, 0.15); color: var(--good); }
      .result {
        margin: 1.5rem auto 0;
        text-align: center;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      .result .headline {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .result .headline.correct { color: var(--good); }
      .result .headline.wrong { color: var(--bad); }
      .result .detail { color: var(--muted); font-size: 0.95rem; }
      .result-actions {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
        margin-top: 1.25rem;
      }
      .result-actions button {
        width: 100%;
        max-width: 340px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        border-radius: 10px;
        cursor: pointer;
      }
      .share-cta {
        background: var(--accent);
        color: #fff;
        border: 0;
        padding: 0.95rem 1.5rem;
        font-size: 1.1rem;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.55rem;
        box-shadow: 0 6px 20px rgba(124, 92, 255, 0.35);
        transition: filter 120ms ease, transform 80ms ease, box-shadow 120ms ease;
      }
      .share-cta:hover {
        filter: brightness(1.08);
        transform: translateY(-1px);
        box-shadow: 0 8px 26px rgba(124, 92, 255, 0.45);
      }
      .btn-next {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 0.65rem 1.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        transition: border-color 120ms ease, color 120ms ease;
      }
      .btn-next:hover { border-color: var(--accent); color: var(--text); }
      .btn-next:disabled { opacity: 0.5; cursor: wait; }
      .loading {
        text-align: center;
        color: var(--muted);
        padding: 4rem 1rem;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      .error {
        background: rgba(255, 92, 122, 0.1);
        border: 1px solid var(--bad);
        color: var(--bad);
        padding: 1rem;
        border-radius: 10px;
        text-align: center;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <main id="app">
      <header>
        <h1>Spot the <span class="accent">AI</span></h1>
        <div class="header-right">
          <div class="score">
            Score: <strong>{{ score }}</strong> / {{ played }}
            <span v-if="played > 0"> · {{ accuracy }}%</span>
          </div>
          <a class="share" href="/stats">Stats</a>
        </div>
      </header>

      <p class="prompt">Two passages. One was written by a human, one by Claude. Pick the AI.</p>

      <div v-if="error" class="error">{{ error }}</div>

      <div v-else-if="loading" class="loading">Generating round…</div>

      <template v-else-if="round">
        <div class="grid">
          <div
            v-for="side in ['A', 'B']"
            :key="side"
            class="card"
            :class="cardClass(side)"
            @click="guess(side)"
          >
            <div class="label">Passage {{ side }}</div>
            <div class="text">{{ side === 'A' ? round.textA : round.textB }}</div>
            <div v-if="result" class="verdict">
              <span class="tag" :class="sideIsAi(side) ? 'ai' : 'human'">
                {{ sideIsAi(side) ? 'AI' : 'Human' }}
              </span>
              <span v-if="!sideIsAi(side)">{{ result.humanSource }}</span>
            </div>
          </div>
        </div>

        <div v-if="result" class="result">
          <div class="headline" :class="result.correct ? 'correct' : 'wrong'">
            {{ result.correct ? 'Correct.' : 'Fooled you.' }}
          </div>
          <div class="detail">
            The AI passage was {{ result.aiSide }}. You've spotted {{ score }} of {{ played }} ({{ accuracy }}%).
          </div>
          <div class="result-actions">
            <button class="share-cta" @click="share">
              <span aria-hidden="true">📣</span>
              {{ copied ? 'Copied — now paste it!' : 'Share your score' }}
            </button>
            <button class="btn-next" :disabled="loading" @click="nextRound">Next round →</button>
          </div>
        </div>
      </template>
    </main>

    <script>
      const { createApp, ref, computed } = Vue;

      createApp({
        setup() {
          const round = ref(null);
          const result = ref(null);
          const loading = ref(false);
          const error = ref(null);
          const score = ref(0);
          const played = ref(0);
          const history = ref([]); // booleans, one per guess
          const copied = ref(false);

          const SHARE_URL = 'https://spot-the-ai.oiatc.ca';

          // Anonymous, account-free identity + cross-visit persistence.
          const SESSION_KEY = 'sta_session_v1';
          const STATE_KEY = 'sta_state_v1';
          function loadSession() {
            let id = localStorage.getItem(SESSION_KEY);
            if (!id) {
              id = (crypto.randomUUID && crypto.randomUUID()) ||
                String(Date.now()) + Math.random().toString(16).slice(2);
              localStorage.setItem(SESSION_KEY, id);
            }
            return id;
          }
          const sessionId = loadSession();
          let roundShownAt = 0;

          try {
            const saved = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
            if (Number.isFinite(saved.score)) score.value = saved.score;
            if (Number.isFinite(saved.played)) played.value = saved.played;
            if (Array.isArray(saved.history)) history.value = saved.history.slice(-50);
          } catch (e) { /* ignore corrupt state */ }
          function persist() {
            try {
              localStorage.setItem(STATE_KEY, JSON.stringify({
                score: score.value, played: played.value, history: history.value.slice(-50),
              }));
            } catch (e) { /* storage full or blocked */ }
          }

          const accuracy = computed(() =>
            played.value === 0 ? 0 : Math.round((score.value / played.value) * 100),
          );

          const shareText = computed(() => {
            const grid = history.value
              .map((ok) => (ok ? '✅' : '❌'))
              .reduce((rows, mark, i) => {
                if (i % 5 === 0) rows.push('');
                rows[rows.length - 1] += mark;
                return rows;
              }, [])
              .join('\n');
            const lines = [
              'Spot the AI 🤖',
              `${score.value}/${played.value} correct (${accuracy.value}%)`,
              grid,
              'Can you tell which passage Claude wrote?',
            ];
            if (SHARE_URL) lines.push(SHARE_URL);
            return lines.join('\n');
          });

          async function share() {
            const text = shareText.value;
            if (navigator.share) {
              try {
                await navigator.share({ title: 'Spot the AI', text });
                return;
              } catch (e) {
                if (e.name === 'AbortError') return; // user dismissed
              }
            }
            try {
              await navigator.clipboard.writeText(text);
            } catch (e) {
              window.prompt('Copy your results:', text);
              return;
            }
            copied.value = true;
            setTimeout(() => (copied.value = false), 1800);
          }

          async function nextRound() {
            loading.value = true;
            error.value = null;
            result.value = null;
            round.value = null;
            try {
              const params = new URLSearchParams({ s: sessionId });
              if (document.referrer) params.set('ref', document.referrer);
              const res = await fetch('/api/round?' + params.toString());
              if (!res.ok) throw new Error((await res.json()).error || 'round failed');
              round.value = await res.json();
              roundShownAt = performance.now();
            } catch (e) {
              error.value = e.message;
            } finally {
              loading.value = false;
            }
          }

          async function guess(side) {
            if (!round.value || result.value) return;
            try {
              const res = await fetch('/api/guess', {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({
                  roundId: round.value.roundId,
                  pick: side,
                  sessionId,
                  decideMs: roundShownAt ? performance.now() - roundShownAt : null,
                  sessionRoundN: played.value + 1,
                  viewportW: window.innerWidth,
                }),
              });
              if (!res.ok) throw new Error((await res.json()).error || 'guess failed');
              const data = await res.json();
              result.value = data;
              played.value += 1;
              history.value.push(data.correct);
              if (data.correct) score.value += 1;
              persist();
            } catch (e) {
              error.value = e.message;
            }
          }

          function sideIsAi(side) {
            return result.value && result.value.aiSide === side;
          }

          function cardClass(side) {
            if (!result.value) return '';
            return ['locked', sideIsAi(side) ? 'revealed-ai' : 'revealed-human'];
          }

          nextRound();

          return {
            round, result, loading, error, score, played, accuracy,
            copied, nextRound, guess, sideIsAi, cardClass, share,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
